name: Build

on:
  workflow_call:
    inputs:
      artifact-prefix:
        type: string
        required: false
        default: redis-compressed

permissions:
  contents: read

jobs:
  linux-build:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runs_on }}
    container:
      image: rockylinux:8
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-24.04
          - arch: arm64
            runs_on: ubuntu-24.04-arm

    steps:
      - name: Install build dependencies
        run: dnf install -y git cmake gcc make tar gzip

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build
        run: make release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-prefix }}-linux-${{ matrix.arch }}
          path: build/release/libredis-compressed.so
          if-no-files-found: error
