name: CI

on:
  push:
  workflow_dispatch:

jobs:
  linux-build:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runs_on }}
    container:
      image: rockylinux:8
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runs_on: ubuntu-24.04
            artifact_name: redis-compressed-linux-x64
          - arch: arm64
            runs_on: ubuntu-24.04-arm
            artifact_name: redis-compressed-linux-arm64

    steps:
      - name: Install build dependencies
        run: dnf install -y git cmake gcc make tar gzip

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build
        run: make release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: build/release/libredis-compressed.so
          if-no-files-found: error

  linux-test:
    name: Test Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runs_on }}
    needs: linux-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runs_on: ubuntu-24.04
            artifact_name: redis-compressed-linux-x64
          - arch: arm64
            runs_on: ubuntu-24.04-arm
            artifact_name: redis-compressed-linux-arm64

    steps:
      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y tar nodejs

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download built module
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact_name }}
          path: build/release

      - name: Run integration tests
        run: REDIS_COMPRESSED_MODULE="$PWD/build/release/libredis-compressed.so" node --test test/tests/integration.js
